<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="记录与管理各项目标的学习进度" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="学习进度" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/svg+xml" href="icons/icon.svg" />
    <link rel="apple-touch-icon" href="icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>学习进度</title>
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-inner">
          <div class="header-left">
            <button type="button" class="btn btn-ghost back-btn" id="back-btn" hidden aria-label="返回">← 返回</button>
            <div class="brand">
              <div class="brand-icon" aria-hidden="true">📚</div>
              <div>
                <h1 id="page-title">学习进度</h1>
                <p class="subtitle" id="page-subtitle">用任务节点驱动每一次进步</p>
              </div>
            </div>
          </div>
          <div class="header-actions">
            <button type="button" class="btn btn-ghost" id="edit-goal-header-btn" hidden>编辑</button>
            <button type="button" class="btn btn-ghost" id="install-btn" hidden>安装应用</button>
            <button type="button" class="btn btn-primary" id="add-goal-btn">+ 新目标</button>
          </div>
        </div>
      </header>

      <main class="main">
        <div class="update-banner" id="update-banner" hidden>
          <span>发现新版本，请刷新以使用最新功能</span>
          <button type="button" class="btn btn-primary btn-sm" id="reload-app-btn">立即刷新</button>
        </div>

        <!-- 首页：概览卡片 -->
        <section class="view" id="view-home">
          <h2 class="view-title">学习概览</h2>
          <div class="nav-cards" id="nav-cards"></div>
          <div class="home-summary" id="home-summary"></div>
        </section>

        <!-- 目标列表 -->
        <section class="view" id="view-goals" hidden>
          <div class="view-head">
            <h2 class="view-title" id="goals-view-title">全部目标</h2>
            <p class="sort-hint" id="sort-hint" hidden>拖动 ⋮⋮ 或点击 ↑ ↓ 调整顺序（仅「全部目标」）</p>
          </div>
          <div class="goals-grid" id="goals-grid"></div>
          <div class="empty-state" id="empty-state" hidden>
            <div class="empty-icon">🎯</div>
            <h3>还没有学习目标</h3>
            <p>创建目标后，添加任务节点来追踪每一步学习进度</p>
            <button type="button" class="btn btn-primary" id="empty-add-btn">创建第一个目标</button>
          </div>
        </section>

        <!-- 目标详情：任务节点 -->
        <section class="view" id="view-goal-detail" hidden>
          <div id="goal-detail-body"></div>
        </section>
      </main>
    </div>

    <!-- 目标编辑弹窗 -->
    <dialog class="modal modal-wide" id="goal-modal">
      <form class="modal-content" id="goal-form">
        <div class="modal-header">
          <h3 id="goal-modal-title">新建目标</h3>
          <button type="button" class="icon-btn" id="close-goal-modal" aria-label="关闭">✕</button>
        </div>
        <div class="form-grid">
          <label class="field full">
            <span>目标名称</span>
            <input type="text" name="title" required maxlength="60" placeholder="例如：Python 数据分析" />
          </label>
          <div class="field full task-editor">
            <div class="task-editor-head">
              <span>任务节点</span>
              <span class="task-editor-hint">按顺序添加学习步骤，勾选完成即推进进度</span>
            </div>
            <div class="task-input-list" id="goal-task-list"></div>
            <button type="button" class="btn btn-ghost btn-sm add-task-row-btn" id="add-task-row-btn">+ 添加任务节点</button>
          </div>
          <label class="field full">
            <span>描述（可选）</span>
            <textarea name="description" rows="2" maxlength="200" placeholder="简要说明学习目标…"></textarea>
          </label>
          <label class="field">
            <span>分类</span>
            <input type="text" name="category" maxlength="20" placeholder="编程 / 语言 / 考证" />
          </label>
          <label class="field">
            <span>截止日期（可选）</span>
            <input type="date" name="deadline" />
          </label>
          <label class="field">
            <span>颜色标记</span>
            <input type="color" name="color" value="#3b82f6" />
          </label>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="delete-goal-btn" hidden>删除目标</button>
          <div class="modal-footer-right">
            <button type="button" class="btn btn-ghost" id="cancel-goal-btn">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </div>
      </form>
    </dialog>

    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script src="app.js" type="module"></script>
  </body>
</html>
